<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tendrela — Daily Ritual</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: hsl(240, 7%, 4%);
    color: hsl(40, 15%, 88%);
    font-family: 'Spectral', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .loading {
    font-size: 1.0rem;
    font-style: italic;
    letter-spacing: 0.12em;
    opacity: 0.35;
  }
</style>
</head>
<body>

<span class="loading">opening daily ritual</span>

<script>
// Supabase config
var SB_URL = 'https://bfzqxqhuxfcpzigayqji.supabase.co';
var SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmenF4cWh1eGZjcHppZ2F5cWppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzY1MjgsImV4cCI6MjA4ODI1MjUyOH0.EckWMCz1y7TZBvkwxcKqLz6m8Rr2HDLDOPoCOZw2HkI';

// Map of word_text (with diacritics) to sanitized ASCII filename.
var FILENAME_MAP = {
  'aloríssī': 'alorissi',
  'amalgré': 'amalgre',
  'cedözsabir': 'cedozsabir',
  'colligakūsma': 'colligakusma',
  'doxamoha': 'doxamoha',
  'goyohawl': 'goyohawl',
  'idiopillu': 'idiopillu',
  'kökthương': 'kokthuong',
  'privosabi': 'privosabi',
  'salethedön': 'salethedon'
};

function sanitize(word) {
  if (FILENAME_MAP[word]) return FILENAME_MAP[word];
  return word.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

var redirected = false;
function goToLexicon() {
  if (redirected) return;
  redirected = true;
  window.location.replace('lexicon.html');
}
function goToWord(filename) {
  if (redirected) return;
  redirected = true;
  window.location.replace('words/' + filename + '.html');
}

var fallbackTimer = setTimeout(goToLexicon, 5000);

fetch(
  SB_URL + '/rest/v1/lexicon?is_published=eq.true&select=word_text,published_at&order=published_at.desc&limit=1',
  { headers: { 'apikey': SB_ANON_KEY, 'Authorization': 'Bearer ' + SB_ANON_KEY } }
)
.then(function(r) { return r.json(); })
.then(function(data) {
  clearTimeout(fallbackTimer);
  if (Array.isArray(data) && data.length > 0 && data[0].word_text) {
    goToWord(sanitize(data[0].word_text));
  } else {
    goToLexicon();
  }
})
.catch(function() {
  clearTimeout(fallbackTimer);
  goToLexicon();
});
</script>

</body>
</html>
